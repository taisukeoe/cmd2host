# tinyproxy config for the claude-oneshot --api-only sidecar.
#
# Restrictive by default:
#   - Only HTTPS CONNECT to port 443 is permitted (ConnectPort 443)
#   - Destination hosts are limited to entries in /etc/tinyproxy/filter
#     (FilterDefaultDeny Yes makes the filter an allowlist)
#   - DisableViaHeader Yes keeps the proxy invisible to inspection tools
#
# Adopters tighten or widen the allowlist by editing tinyproxy.filter in
# the build context.

User tinyproxy
Group tinyproxy

Listen 0.0.0.0
Port 8080

Timeout 600
LogLevel Notice
Logfile "/dev/stdout"

MaxClients 100
DisableViaHeader Yes

# HTTPS CONNECT only — no plain HTTP forwarding.
ConnectPort 443

# Allow inbound from the --internal Docker network. The actual destination
# allowlist lives in /etc/tinyproxy/filter below.
Allow 0.0.0.0/0

# Allowlist filter for HTTPS CONNECT destinations.
# FilterDefaultDeny Yes turns the filter file into an allowlist:
# only hosts that match an entry in /etc/tinyproxy/filter are permitted.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
