name: Publish DevContainer Features

on:
  push:
    tags:
      - 'devcontainer-feature-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Validate feature tag matches feature version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#devcontainer-feature-v}"
          if [ "$TAG_VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Unexpected tag format: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver in tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          FEATURE_VERSION="$(python3 -c 'import json; print(json.load(open("src/cmd2host/devcontainer-feature.json", encoding="utf-8"))["version"])')"
          if [ "$TAG_VERSION" != "$FEATURE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match feature version ($FEATURE_VERSION)" >&2
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # ratchet:docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Features
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # ratchet:devcontainers/action@v1
        with:
          publish-features: 'true'
          base-path-to-features: './src'
          features-namespace: '${{ github.repository }}'
          generate-docs: 'true'
          disable-repo-tagging: 'true'
