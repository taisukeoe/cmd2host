name: Release Binaries

on:
  push:
    tags:
      - 'binary-v*'

permissions:
  contents: write

jobs:
  build-host:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Derive binary version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#binary-v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Unexpected tag format: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver in tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: host/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd host
          go build -ldflags="-s -w -X main.version=${VERSION}" -o cmd2host-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: cmd2host-${{ matrix.goos }}-${{ matrix.goarch }}
          path: host/cmd2host-${{ matrix.goos }}-${{ matrix.goarch }}

  build-mcp:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Derive binary version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#binary-v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Unexpected tag format: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver in tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version: '1.23'
          cache-dependency-path: mcp-server/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd mcp-server
          go build -ldflags="-s -w -X main.version=${VERSION}" -o cmd2host-mcp-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: cmd2host-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mcp-server/cmd2host-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: [build-host, build-mcp]
    runs-on: ubuntu-slim
    steps:
      - name: Derive binary version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#binary-v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Unexpected tag format: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver in tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage binaries for release
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          for f in artifacts/*/cmd2host-*; do
            base="$(basename "$f")"
            if [ -e "release-assets/$base" ]; then
              echo "Duplicate binary name detected: $base" >&2
              exit 1
            fi
            cp "$f" "release-assets/$base"
          done
          shopt -u nullglob

      - name: Verify expected binary set
        run: |
          expected=(
            cmd2host-darwin-amd64
            cmd2host-darwin-arm64
            cmd2host-mcp-linux-amd64
            cmd2host-mcp-linux-arm64
            cmd2host-mcp-darwin-amd64
            cmd2host-mcp-darwin-arm64
          )
          missing=0
          for name in "${expected[@]}"; do
            if [ ! -f "release-assets/$name" ]; then
              echo "Missing expected release binary: $name" >&2
              missing=1
            fi
          done
          count=$(find release-assets -maxdepth 1 -type f -name 'cmd2host-*' | wc -l | tr -d ' ')
          if [ "$count" -ne "${#expected[@]}" ]; then
            echo "Unexpected release binary count: got $count, expected ${#expected[@]}" >&2
            find release-assets -maxdepth 1 -type f -name 'cmd2host-*' -print >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate checksums.txt
        run: |
          cd release-assets
          # The Verify-expected-binary-set step has already enforced the exact
          # set of `cmd2host-*` files in this directory, so the glob is safe
          # (no surprise extra files). Using the glob (rather than `find . | xargs`)
          # avoids a leading `./` in the filename column of `sha256sum` output,
          # which keeps checksums.txt clean for both `sha256sum -c` and humans.
          sha256sum cmd2host-* > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt
          # Strict guard: the generated checksum file must contain one entry per
          # staged binary. The Verify step above owns exact-set validation.
          binary_count=$(find . -maxdepth 1 -type f -name 'cmd2host-*' | wc -l | tr -d ' ')
          entries=$(wc -l < checksums.txt | tr -d ' ')
          if [ "$entries" -ne "$binary_count" ]; then
            echo "checksums.txt has $entries entries, expected $binary_count binaries" >&2
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # ratchet:softprops/action-gh-release@v1
        with:
          name: cmd2host v${{ env.VERSION }}
          files: |
            release-assets/cmd2host-*
            release-assets/checksums.txt
          generate_release_notes: true
