name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [synchronize, opened, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      host: ${{ steps.filter.outputs.host }}
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # ratchet:dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            host:
              - 'host/**'
              - 'mcp-server/**'
              - 'justfile'
              - 'test/host/**'
              - '.github/workflows/ci.yml'
            devcontainer:
              - 'src/**'
              - 'test/cmd2host/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'host/**'
              - 'mcp-server/**'
              - 'src/**'
              - 'test/e2e/**'
              - '.devcontainer/**'
              - '.github/workflows/ci.yml'

  test-host:
    needs: changes
    if: needs.changes.outputs.host == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # ratchet:actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: |
            host/go.sum
            mcp-server/go.sum

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # ratchet:extractions/setup-just@v2

      - name: Unit Test (Host)
        run: just test

      - name: Unit Test (MCP Server)
        run: just test-mcp

      - name: Build Host Daemon
        run: just build

      - name: Build MCP Server
        run: just build-mcp

      - name: Host Scenario Test
        env:
          GH_TOKEN: ${{ github.token }}
        run: just test-host

  test-devcontainer:
    needs: changes
    if: needs.changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test devcontainer feature
        run: devcontainer features test --features cmd2host --base-image mcr.microsoft.com/devcontainers/base:ubuntu

  test-e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # ratchet:actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: |
            host/go.sum
            mcp-server/go.sum

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # ratchet:extractions/setup-just@v2

      - name: Cache npm global packages
        uses: actions/cache@db2fc96e519bbacec33eb41d937f5d04214b5d77 # ratchet:actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-devcontainer-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-devcontainer-
            ${{ runner.os }}-npm-

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # ratchet:docker/setup-buildx-action@v3

      - name: Pre-pull base images to speed up devcontainer build
        run: |
          docker pull ubuntu:latest
          docker pull mcr.microsoft.com/vscode/devcontainers/base:ubuntu

      - name: Build MCP server for Linux
        run: just build-mcp-linux-amd64

      - name: E2E Test
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./test/e2e/run_e2e.sh --clean
